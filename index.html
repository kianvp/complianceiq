<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComplianceIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0a1a2f,#0f2a4a);
  color:#e6f0ff;
}
header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#071423;
}
.dot{
  width:10px;height:10px;background:#00ff9c;border-radius:50%;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
.container{display:flex;height:calc(100vh - 50px)}
.sidebar,.right{
  width:220px;background:#071423;padding:10px;
}
.main{flex:1;padding:10px;overflow:auto}
.card{
  background:#132f52;
  padding:10px;margin-bottom:10px;border-radius:8px;
}
.badge{padding:3px 6px;border-radius:5px;font-size:12px}
.high{background:#ff5c5c}
.med{background:gold;color:black}
.low{background:#3aa3ff}
</style>
</head>

<body>

<header>
<div style="display:flex;gap:8px;align-items:center">
<div class="dot"></div> LIVE
</div>
<input id="search" placeholder="Search..." style="padding:6px">
</header>

<div class="container">
<div class="sidebar">
<b>Filters</b><br>
<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('RBI')">RBI</button>
<button onclick="setFilter('SEBI')">SEBI</button>
</div>

<div class="main" id="feed"></div>

<div class="right">
<div id="chat"></div>
<input id="msg"><button onclick="send()">Send</button>
</div>
</div>

<script>
let data=[];
let filter="all";

function demo(){
  data=[];
  for(let i=0;i<25;i++){
    data.push({
      title:"KYC update ₹10,00,000 threshold",
      date:new Date().toLocaleDateString(),
      source:i%2?"RBI":"SEBI",
      severity:"High"
    });
  }
}

function render(){
  let el=document.getElementById("feed");
  let s=document.getElementById("search").value.toLowerCase();
  el.innerHTML="";

  data
  .filter(d=>filter==="all"||d.source===filter)
  .filter(d=>d.title.toLowerCase().includes(s))
  .forEach(d=>{
    el.innerHTML+=`
      <div class="card">
        <b>${d.title}</b><br>
        ${d.date}<br>
        <span class="badge ${d.severity.toLowerCase()}">${d.severity}</span>
      </div>
    `;
  });
}

function setFilter(f){filter=f;render()}
document.getElementById("search").oninput=render;

async function loadRSS(){
  try{
    let url="https://api.allorigins.win/raw?url=https://www.rbi.org.in/notifications_rss.xml";
    let res=await fetch(url);
    let txt=await res.text();

    let xml=new DOMParser().parseFromString(txt,"text/xml");
    let items=[...xml.querySelectorAll("item")];

    if(items.length===0) return;

    data=items.map(i=>({
      title:i.querySelector("title")?.textContent||"",
      date:new Date(i.querySelector("pubDate")?.textContent||Date.now()).toLocaleDateString(),
      source:"RBI",
      severity:"Med"
    }));

    render();

  }catch(e){
    console.log("RSS failed");
  }
}

function send(){
  let chat=document.getElementById("chat");
  let q=document.getElementById("msg").value;
  chat.innerHTML+=`<div>You: ${q}</div>`;
  chat.innerHTML+=`<div>AI: Demo response</div>`;
}

demo();       // always load instantly
render();
loadRSS();    // then try real data
setInterval(loadRSS,300000);
</script>

</body>
</html>
