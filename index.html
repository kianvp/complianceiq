<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComplianceIQ — Live RBI / SEBI Circulars</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #1f2937 0, #020617 55%);
      color: #e5e7eb;
      min-height: 100vh;
    }
    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 260px 1fr 380px;
      gap: 24px;
    }
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0 18px;
      border-bottom: 1px solid #334155;
      margin-bottom: 10px;
    }
    .title-block h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .title-block p {
      font-size: 13px;
      color: #9ca3af;
      margin-top: 3px;
    }
    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.7);
      font-size: 12px;
      color: #6ee7b7;
      font-weight: 600;
    }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34,197,94,0.7);
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.35); opacity: 0.4; }
      100% { transform: scale(1); opacity: 1; }
    }
    .search-input {
      width: 280px;
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid #4b5563;
      background: rgba(15,23,42,0.8);
      color: #e5e7eb;
      font-size: 14px;
    }
    .search-input::placeholder { color: #6b7280; }
    .sidebar {
      background: rgba(15,23,42,0.9);
      border-radius: 18px;
      padding: 18px;
      border: 1px solid #374151;
      height: fit-content;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
    }
    .sidebar h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .sidebar p {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 14px;
    }
    .filter-button {
      width: 100%;
      border-radius: 999px;
      border: 1px solid #4b5563;
      background: transparent;
      color: #d1d5db;
      font-size: 13px;
      padding: 8px 12px;
      margin-bottom: 6px;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.18s ease;
    }
    .filter-button span.label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .filter-button span.count-pill {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(31,41,55,0.9);
      color: #9ca3af;
    }
    .filter-button.active {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-color: #60a5fa;
      color: #f9fafb;
      box-shadow: 0 8px 20px rgba(37,99,235,0.45);
    }
    .filter-button.active .count-pill {
      background: rgba(15,23,42,0.9);
      color: #f9fafb;
    }
    .main {
      background: rgba(15,23,42,0.85);
      border-radius: 18px;
      border: 1px solid #374151;
      padding: 20px 18px;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
    }
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 14px;
    }
    .status-bar span strong {
      color: #e5e7eb;
    }
    .circular-card {
      background: linear-gradient(135deg, rgba(31,41,55,0.9), rgba(15,23,42,0.95));
      border-radius: 16px;
      padding: 14px 14px 12px;
      border: 1px solid #374151;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.18s ease;
      position: relative;
      overflow: hidden;
    }
    .circular-card:hover {
      border-color: #60a5fa;
      box-shadow: 0 14px 26px rgba(15,23,42,0.7);
      transform: translateY(-2px);
    }
    .circular-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }
    .source-pill {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
    }
    .source-sebi {
      background: rgba(59,130,246,0.18);
      border: 1px solid rgba(59,130,246,0.7);
      color: #93c5fd;
    }
    .source-rbi {
      background: rgba(249,115,22,0.18);
      border: 1px solid rgba(249,115,22,0.7);
      color: #fed7aa;
    }
    .severity-pill {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 700;
    }
    .severity-high { background: rgba(248,113,113,0.15); border: 1px solid #f97373; color: #fecaca; }
    .severity-medium { background: rgba(251,191,36,0.16); border: 1px solid #facc15; color: #fef3c7; }
    .severity-low { background: rgba(34,197,94,0.16); border: 1px solid #22c55e; color: #bbf7d0; }
