<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComplianceIQ — Live RBI/SEBI Banking Circulars</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%); 
      color: #e2e8f0; 
      min-height: 100vh;
      overflow-x: hidden;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 280px 1fr 400px; gap: 30px; height: calc(100vh - 40px); }
    .header { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid #334155; margin-bottom: 20px; }
    .live-dot { display: inline-flex; align-items: center; gap: 8px; background: #10b981; color: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; }
    .live-dot::before { content: ''; width: 8px; height: 8px; background: #059669; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    .search-box { background: rgba(255,255,255,.1); border: 1px solid #475569; border-radius: 12px; padding: 12px 20px; color: white; width: 300px; font-size: 16px; }
    .search-box::placeholder { color: #94a3b8; }
    .sidebar { background: rgba(15,23,42,.8); backdrop-filter: blur(20px); border-radius: 20px; padding: 25px; height: fit-content; max-height: 80vh; overflow-y: auto; border: 1px solid #334155; }
    .sidebar h3 { color: #f1f5f9; font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .filter-btn { display: block; width: 100%; background: none; border: 1px solid #475569; color: #cbd5e1; padding: 12px 16px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; text-align: left; font-size: 15px; transition: all .3s; }
    .filter-btn:hover { background: rgba(59,130,246,.1); border-color: #60a5fa; color: #bfdbfe; }
    .filter-btn.active { background: linear-gradient(135deg, #3b82f6, #1d4ed8); border-color: #2563eb; color: white; }
    .main-content { background: rgba(15,23,42,.6); backdrop-filter: blur(20px); border-radius: 20px; padding: 30px; max-height: 80vh; overflow-y: auto; border: 1px solid #334155; }
    .circular-card { background: rgba(255,255,255,.05); border: 1px solid #475569; border-radius: 16px; padding: 25px; margin-bottom: 20px; cursor: pointer; transition: all .3s; position: relative; overflow: hidden; }
    .circular-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,.3); border-color: #60a5fa; }
    .circular-card h4 { color: #f8fafc; font-size: 18px; font-weight: 600; margin-bottom: 12px; line-height: 1.4; }
    .circular-date { color: #94a3b8; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
    .severity-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-right: 8px; margin-bottom: 8px; }
    .high { background: #ef4444; color: white; }
    .medium { background: #f59e0b; color: white; }
    .low { background: #10b981; color: white; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
    .tag { background: rgba(59,130,246,.2); color: #60a5fa; padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: 500; }
    .ask-ai-btn { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all .3s; width: 100%; }
    .ask-ai-btn:hover { transform: scale(1.02); box-shadow: 0 10px 25px rgba(139,92,246,.4); }
    .ai-chat { background: rgba(15,23,42,.95); backdrop-filter: blur(25px); border-radius: 20px; padding: 25px; border: 1px solid #475569; }
    .ai-chat h3 { color: #f8fafc; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .chat-messages { max-height: 400px; overflow-y: auto; margin-bottom: 20px; }
    .message { margin-bottom: 15px; padding: 15px; border-radius: 12px; }
    .ai-message { background: rgba(59,130,246,.2); color: #bfdbfe; border-left: 4px solid #3b82f6; }
    .user-message { background: rgba(16,185,129,.2); color: #6ee7b7; border-left: 4px solid #10b981; }
    .chat-input { display: flex; gap: 10px; }
    .chat-input input { flex: 1; background: rgba(255,255,255,.1); border: 1px solid #475569; border-radius: 12px; padding: 15px 20px; color: white; font-size: 16px; }
    .chat-input input::placeholder { color: #94a3b8; }
    .chat-input button { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 15px 25px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all .3s; }
    .quick-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
    .chip { background: rgba(255,255,255,.1); color: #e2e8f0; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; transition: all .3s; border: 1px solid #475569; }
    .chip:hover { background: #60a5fa; color: white; }
    @media (max-width: 1200px) { .container { grid-template-columns: 1fr; gap: 20px; } .sidebar, .ai-chat { order: -1; } }
    .no-circulars { text-align: center; padding: 60px 20px; color: #94a3b8; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px 20px; color: #60a5fa; }
    .spinner { width: 30px; height: 30px; border: 3px solid #334155; border-top: 3px solid #60a5fa; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .highlight { background: linear-gradient(120deg, #fbbf24 0%, #f59e0b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 700; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="live-dot" id="liveDot">● LIVE <span id="lastUpdate"></span></div>
      <input type="text" class="search-box" id="searchBox" placeholder="Search circulars...">
    </div>
    
    <div class="sidebar">
      <h3>📋 Filters</h3>
      <button class="filter-btn active" data-filter="all">All Sources</button>
      <button class="filter-btn" data-filter="SEBI">SEBI</button>
      <button class="filter-btn" data-filter="RBI">RBI</button>
      <button class="filter-btn" data-filter="AML">AML/KYC</button>
      <button class="filter-btn" data-filter="Basel">Basel III</button>
      <button class="filter-btn" data-filter="Cyber">Cybersecurity</button>
      <button class="filter-btn" data-filter="SAR">SAR/STR</button>
    </div>

    <div class="main-content">
      <div id="loading" class="loading"><div class="spinner"></div>Loading live circulars...</div>
      <div id="circularsList" style="display: none;"></div>
      <div id="noResults" class="no-circulars" style="display: none;">No matching circulars found</div>
    </div>

    <div class="ai-chat">
      <h3>🤖 Ask AI About Compliance</h3>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Ask about any circular or regulation...">
        <button onclick="sendMessage()">Send</button>
      </div>
      <div class="quick-chips">
        <div class="chip" onclick="quickQuestion('What triggers a SAR filing?')">What triggers SAR?</div>
        <div class="chip" onclick="quickQuestion('What are KYC penalties in India?')">KYC penalties?</div>
        <div class="chip" onclick="quickQuestion('What is structuring and why illegal?')">Structuring rules?</div>
        <div class="chip" onclick="quickQuestion('Latest Basel III LCR changes?')">Basel III LCR?</div>
      </div>
    </div>
  </div>

  <script>
    // Configuration
    const RSS_FEEDS = {
      SEBI: 'https://api.allorigins.win/raw?url=https://www.sebi.gov.in/sebirss.xml',
      RBI: 'https://api.allorigins.win/raw?url=https://www.rbi.org.in/notifications_rss.xml'
    };
    const GROQ_API_KEY = 'gsk_your_free_key_here'; // Replace with your free Groq key or leave for demo
    let allCirculars = [];
    let currentFilter = 'all';

    // Auto-refresh every 5 minutes
    setInterval(fetchCirculars, 5 * 60 * 1000);

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      fetchCirculars();
      setupEventListeners();
      updateLiveStatus();
    });

    function setupEventListeners() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelector('.filter-btn.active').classList.remove('active');
          this.classList.add('active');
          currentFilter = this.dataset.filter;
          renderCirculars();
        });
      });

      document.getElementById('searchBox').addEventListener('input', renderCirculars);
      document.getElementById('chatInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
      });
    }

    async function fetchCirculars() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('circularsList').style.display = 'none';
      
      allCirculars = [];
      
      try {
        // Fetch SEBI
        try {
          const sebiResponse = await fetch(RSS_FEEDS.SEBI);
          const sebiText = await sebiResponse.text();
          const sebiParser = new DOMParser();
          const sebiXml = sebiParser.parseFromString(sebiText, 'text/xml');
          const sebiItems = Array.from(sebiXml.querySelectorAll('item')).slice(0, 15);
          
          sebiItems.forEach(item => {
            allCirculars.push({
              source: 'SEBI',
              title: item.querySelector('title').textContent,
              date: item.querySelector('pubDate')?.textContent || new Date().toISOString(),
              link: item.querySelector('link')?.textContent || '#',
              description: item.querySelector('description')?.textContent || '',
              id: item.querySelector('guid')?.textContent || item.querySelector('link')?.textContent
            });
          });
        } catch(e) { console.log('SEBI feed temp unavailable'); }

        // Fetch RBI  
        try {
          const rbiResponse = await fetch(RSS_FEEDS.RBI);
          const rbiText = await rbiResponse.text();
          const rbiParser = new DOMParser();
          const rbiXml = rbiParser.parseFromString(rbiText, 'text/xml');
          const rbiItems = Array.from(rbiXml.querySelectorAll('item')).slice(0, 15);
          
          rbiItems.forEach(item => {
            allCirculars.push({
              source: 'RBI',
              title: item.querySelector('title').textContent,
              date: item.querySelector('pubDate')?.textContent || new Date().toISOString(),
              link: item.querySelector('link')?.textContent || '#',
              description: item.querySelector('description')?.textContent || '',
              id: item.querySelector('guid')?.textContent || item.querySelector('link')?.textContent
            });
          });
        } catch(e) { console.log('RBI feed temp unavailable'); }

        // Add demo data if feeds empty
        if (allCirculars.length === 0) {
          allCirculars = [
            {source: 'SEBI', title: 'Revised KYC Norms - ₹5 Lakh Threshold', date: '2026-03-20', link: '#', description: 'Mandatory KYC for accounts > ₹5 lakhs', id: 'demo1'},
            {source: 'RBI', title: 'SAR Filing Deadline - 7 Days', date: '2026-03-18', link: '#', description: 'STR reporting within 7 days of detection', id: 'demo2'}
          ];
        }

        // Analyze and tag
        allCirculars.forEach(circular => {
          circular.tags = analyzeTags(circular.title + circular.description);
          circular.severity = analyzeSeverity(circular);
          circular.summary = circular.description.substring(0, 150) + '...';
        });

        renderCirculars();
        updateLiveStatus();
      } catch(error) {
        console.error('Feed error:', error);
        document.getElementById('noResults').textContent = 'Feeds temporarily unavailable - using demo data';
        document.getElementById('noResults').style.display = 'block';
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    function analyzeTags(text) {
      const tags = [];
      const keywords = {
        AML: ['AML', 'KYC', 'structuring', 'suspicious', 'SAR', 'STR'],
        Basel: ['Basel', 'LCR', 'capital', 'liquidity'],
        Cyber: ['cyber', 'cybersecurity', 'IT', 'data protection'],
        SAR: ['SAR', 'STR', 'suspicious activity']
      };
      
      for (const [tag, words] of Object.entries(keywords)) {
        if (words.some(word => text.toLowerCase().includes(word.toLowerCase()))) {
          tags.push(tag);
        }
      }
      return tags.length ? tags : ['General'];
    }

    function analyzeSeverity(circular) {
      const highRisk = ['SAR', 'suspicious', 'penalty', 'fine', '₹10 lakh', '₹1 crore'];
      const medRisk = ['KYC', 'AML', 'capital', 'liquidity', 'deadline'];
      
      const text = circular.title + circular.description;
      if (highRisk.some(word => text.toLowerCase().includes(word.toLowerCase()))) return 'high';
      if (medRisk.some(word => text.toLowerCase().includes(word.toLowerCase()))) return 'medium';
      return 'low';
    }

    function renderCirculars() {
      const searchTerm = document.getElementById('searchBox').value.toLowerCase();
      let filtered = allCirculars.filter(circular => {
        const matchesFilter = currentFilter === 'all' || 
          circular.source === currentFilter || 
          circular.tags.includes(currentFilter);
        const matchesSearch = !searchTerm || 
          circular.title.toLowerCase().includes(searchTerm) || 
          circular.description.toLowerCase().includes(searchTerm);
        return matchesFilter && matchesSearch;
      });

      const container = document.getElementById('circularsList');
      if (filtered.length === 0) {
        document.getElementById('noResults').style.display = 'block';
        container.style.display = 'none';
        return;
      }

      document.getElementById('noResults').style.display = 'none';
      container.innerHTML = filtered.map(circular => `
        <div class="circular-card" onclick="openCircular('${circular.id}')">
          <div class="severity-badge ${circular.severity}">${circular.severity.toUpperCase()} RISK</div>
          <h4>${highlightThresholds(circular.title)}</h4>
          <div class="circular-date">${formatDate(circular.date)}</div>
          <div class="tags">${circular.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
          <div style="color: #94a3b8; font-size: 14px; line-height: 1.5;">${circular.summary}</div>
          <button class="ask-ai-btn" onclick="event.stopPropagation(); askAI('${circular.id}')">Ask AI: Action Items</button>
        </div>
      `).join('');
      container.style.display = 'block';
    }

    function formatDate(dateStr) {
      try {
        const rawDate = dateStr.trim();
        const date = new Date(rawDate);
        return isNaN(date) ? rawDate.slice(0, 16) : date.toLocaleDateString('en-IN', { 
          day: 'numeric', month: 'short', year: 'numeric' 
        });
      } catch(e) {
        return 'Recent';
      }
    }

    function highlightThresholds(text) {
      const highlights = [
        {match: /₹(\d+(,\d{3})*)/g, class: 'highlight'},
        {match: /(\d{1,3}(,\d{3})*\s*(lakh|crore))/gi, class: 'highlight'},
        {match: /\$10k|10k USD/g, class: 'highlight'}
      ];
      
      let result = text;
      highlights.forEach(({match, class: cls}) => {
        result = result.replace(match, '<span class="highlight">$1</span>');
      });
      return result;
    }

    async function askAI(circularId) {
      const circular = allCirculars.find(c => c.id === circularId);
      if (!circular) return;

      addMessage('user', `Summarize action items for banks from: "${circular.title}"`);
      document.getElementById('chatInput').value = '';

      try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${GROQ_API_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'llama3-8b-8192',
            messages: [{
              role: 'user',
              content: `Banking compliance context. For this RBI/SEBI circular: "${circular.title}"\n\n${circular.description}\n\nGive 3-5 specific action items for compliance teams (bullets). Highlight thresholds in gold. Indian banking context.`
            }]
          })
        });

        const data = await response.json();
        const aiResponse = data.choices[0].message.content;
        addMessage('ai', aiResponse);
      } catch(e) {
        addMessage('ai', '⚠️ Demo mode: Banks must review circular within 48hrs, update policies, train staff on new ₹5 lakh KYC threshold, file compliance confirmation with RBI/SEBI.');
      }
    }

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const question = input.value.trim();
      if (!question) return;

      addMessage('user', question);
      input.value = '';
    }

    function quickQuestion(question) {
      document.getElementById('chatInput').value = question;
      sendMessage();
    }

    function addMessage(sender, text) {
      const messages = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}-message`;
      messageDiv.innerHTML = `<strong>${sender === 'user' ? 'You' : 'AI'}:</strong> ${text}`;
      messages.appendChild(messageDiv);
      messages.scrollTop = messages.scrollHeight;
    }

    function openCircular(id) {
      const circular = allCirculars.find(c => c.id === id);
      if (circular.link !== '#') {
        window.open(circular.link, '_blank');
      }
    }

    function updateLiveStatus() {
      document.getElementById('lastUpdate').textContent = `Updated ${new Date().toLocaleTimeString('en-IN')}`;
    }

    // Search responsiveness
    let searchTimeout;
    document.getElementById('searchBox').addEventListener('input', function() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(renderCirculars, 300);
    });
  </script>
</body>
</html>
